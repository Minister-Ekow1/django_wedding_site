{% extends "base.html" %}
{% block content %}

<h2 class="text-center mb-5 mt-3">
  {{ settings.title }}
</h2>

<div class="container">

  <div class="row align-items-start">

    <!-- LEFT: PROGRAM POSTER -->
    <div class="col-md-5 text-center mb-4">

      {% if settings.poster %}
      <img src="{{ settings.poster.url }}"
           class="img-fluid rounded shadow poster-img">
      {% endif %}

    </div>

    <!-- RIGHT: TIMELINE -->
    <div class="col-md-7">

      <div class="timeline">

        {% for event in events %}
        <div class="timeline-item card p-3 mb-4">

          <div class="d-flex align-items-center mb-2">
            <span class="time-badge">{{ event.time }}</span>
            <h5 class="ms-3 mb-0">{{ event.title }}</h5>
          </div>

          <p class="text-muted mb-0">{{ event.description }}</p>

        </div>
        {% empty %}
          <p>No program added yet 💍</p>
        {% endfor %}

      </div>

    </div>

  </div>

</div>

<style>

/* POSTER */
.poster-img {
  max-height: 600px;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.poster-img:hover {
  transform: scale(1.03);
}

/* TIMELINE */
.timeline {
  padding-left: 10px;
}

/* EVENT CARD */
.timeline-item {
  border-left: 4px solid #d63384;
  border-radius: 15px;
  transition: all 0.3s ease;
}

.timeline-item:hover {
  transform: translateY(-5px);
}

/* TIME BADGE */
.time-badge {
  background: #d63384;
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
}

/* MOBILE FIX */
@media (max-width: 768px) {
  .poster-img {
    max-height: 400px;
  }
}

</style>

{% endblock %}
