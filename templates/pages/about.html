{% extends "base.html" %}
{% block content %}

<style>
.story-section {
  animation: fadeUp 1s ease-in-out;
  max-width: 1400px;
  margin: auto;
  padding: 20px;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}

/* 💎 HEADER */
.story-header h1 {
  font-family: "Playfair Display";
  font-size: 42px;
  margin-bottom: 5px;
}

/* 🧱 3-COLUMN GRID (FIXED BALANCE) */
.story-grid {
  display: grid;
  grid-template-columns: 1.4fr 1.2fr 1.4fr;
  gap: 60px;
  align-items: start;
  margin-top: 20px;
}

/* 📸 IMAGE (LARGER + CLEANER) */
.couple-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

/* 📍 TIMELINE */
.timeline {
  position: relative;
  padding-left: 25px;
}

.timeline::before {
  content: "";
  position: absolute;
  left: 8px;
  top: 0;
  width: 2px;
  height: 100%;
  background: #d63384;
}

.timeline-item {
  position: relative;
  margin-bottom: 28px;
  padding-left: 20px;
}

.timeline-item::before {
  content: "💖";
  position: absolute;
  left: -16px;
  top: 0;
}

.timeline-item h5 {
  font-size: 18px;
  margin-bottom: 5px;
  font-weight: 600;
}

.timeline-item p {
  font-size: 15px;
  margin: 0;
  color: #555;
}

.couple-img {
  transition: transform 0.4s ease;
}

.couple-img:hover {
  transform: scale(1.03);
}

/* 💌 STORY CARD */
.card {
  border: none;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  line-height: 1.8;
  font-size: 16px;
  padding: 25px;
}

/* ✨ HOVER EFFECT */
.card:hover {
  transform: translateY(-5px);
  transition: 0.3s ease;
}

/* 📱 MOBILE */
@media (max-width: 992px) {
  .story-grid {
    grid-template-columns: 1fr;
    gap: 30px;
  }

  .story-header h1 {
    font-size: 30px;
  }
}
</style>

<div class="container mt-1 story-section">

  <!-- HEADER -->
  <div class="text-center story-header">
    <h1>Our Love Story 💖</h1>
    <p class="text-muted">A journey written by fate</p>
  </div>

  <!-- 🔥 3-COLUMN LAYOUT -->
  <div class="story-grid">

    <!-- LEFT: TIMELINE -->
    <div>
      <h4 class="mb-4">💍 Our Journey</h4>

      <div class="timeline">
  {% for item in timeline %}
  <div class="timeline-item">
    <h5>{{ item.title }}</h5>
    <p>{{ item.description }}</p>
  </div>
  {% endfor %}
</div>
    </div>

    <!-- CENTER: IMAGE -->
    <div>
      {% if about.image %}
  <img src="{{ about.image.url }}" class="couple-img">
{% endif %}
    </div>

    <!-- RIGHT: STORY TEXT -->
    <div>
      <div class="card">
  <h4 class="mb-3 text-center">💖 Our Story</h4>
  <p>{{ about.story }}</p>
</div>
    </div>

  </div>

</div>

{% endblock %}
