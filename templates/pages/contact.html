{% extends "base.html" %}
{% block content %}

<div class="container mt-5 text-center">

    <h2 class="mb-2">📍 {{ venue.name }}</h2>
    <p class="text-muted">{{ venue.address }}</p>

    <div class="map-container mt-4">

        {% if venue %}
        <iframe 
            src="{{ venue.embed_url }}"
            width="100%"
            height="450"
            style="border:0; border-radius:15px;">
        </iframe>
        {% else %}
        <p>No venue added yet</p>
        {% endif %}

    </div>

</div>

{% endblock %}
