{% extends "base.html" %}

{% block fullwidth %}

<style>
  html, body {
    margin-top: 0 !important;
    padding-top: 0 !important;
  }

  .container {
    margin-top: 0 !important;
    padding-top: 0 !important;
  }

  nav {
    margin-bottom: 0 !important;
    position: relative;
    z-index: 1000;
  }

  .hero-wrapper {
    margin-top: 0 !important;
    width: 100vw;
    margin-left: calc(-50vw + 50%);
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .hero video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
  }

  .hero-content h1 {
    font-size: 48px;
    font-family: "Georgia", serif;
  }

  .countdown {
    margin-top: 20px;
    font-size: 22px;
    color: #f8d7da;
  }
</style>

<div class="hero-wrapper">
  <div class="hero">

    <video autoplay muted loop playsinline>
      <source src="/static/video/wedding.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1>💍 Our Forever Begins</h1>
      <p>Join us as we celebrate love and a lifetime together.</p>
      <div id="countdown" class="countdown"></div>
    </div>

  </div>
</div>

<script>
const date = new Date("{{ wedding_date|date:'Y-m-d' }}T10:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const diff = date - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "💍 Today is the big day!";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const mins = Math.floor((diff / (1000 * 60)) % 60);
  const secs = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    `${days}days • ${hours}hours • ${mins}minutes • ${secs}seconds 💕`;
}

setInterval(updateCountdown, 1000);
</script>

{% endblock %}
