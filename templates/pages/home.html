{% extends "base.html" %}

{% block fullwidth %}

<style>
  html,
  body {
    margin: 0 !important;
    padding: 0 !important;
  }

  .hero-wrapper {
    width: 100vw;
    height: 100vh;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    overflow: hidden;
    position: relative;
    left: 50%;
    margin-left: -50vw;
    max-width: 100vw;
    box-sizing: border-box;
  }

  .hero {
    width: 100vw;
    height: 100vh;
    min-height: 100vh;
    max-width: 100vw;
    max-height: 100vh;
    position: relative;
    overflow: hidden;
    left: 0;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .hero video {
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100vh;
    min-width: 100vw;
    min-height: 100vh;
    object-fit: cover;
    max-width: none;
    max-height: none;
    box-sizing: border-box;
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100svh;
    min-height: 400px;
    overflow: hidden;
    max-width: 100vw;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
  }

  .hero video {
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100svh;
    min-height: 100%;
    min-width: 100%;
    object-fit: cover;
    max-width: none;
    max-height: none;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    padding: 0 1rem;
  }

  .hero-content h1 {
    font-size: 8vw;
    font-family: "Georgia", serif;
    margin-bottom: 1rem;
    line-height: 1.1;
  }

  .hero-content p {
    font-size: 1.5rem;
  }

  .countdown {
    margin-top: 1.5rem;
    font-size: 1.2rem;
    color: #f8d7da;
  }

  @media (max-width: 600px) {

    .hero-wrapper,
    .hero {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      left: 0;
      margin-left: 0;
    }

    .hero video {
      width: 100vw;
      height: 100vh;
      min-width: 100vw;
      min-height: 100vh;
    }

    .hero-content h1 {
      font-size: 2rem;
    }

    .hero-content p,
    .countdown {
      font-size: 1rem;
    }
  }
</style>

<div class="hero-wrapper">
  <div class="hero">

    <video autoplay muted loop playsinline>
      <source src="/static/video/wedding.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1>💍Our Forever Begins</h1>
      <p>Join us as we celebrate love and a lifetime together.</p>
      <div id="countdown" class="countdown"></div>
    </div>

  </div>
</div>

<script>
  const date = new Date("{{ wedding_date|date:'Y-m-d' }}T10:00:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const diff = date - now;

    if (diff <= 0) {
      document.getElementById("countdown").innerHTML = "💍 Today is the big day!";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const mins = Math.floor((diff / (1000 * 60)) % 60);
    const secs = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
      `${days}days • ${hours}hours • ${mins}minutes • ${secs}seconds 💕`;
  }

  setInterval(updateCountdown, 1000);
</script>

{% endblock %}
